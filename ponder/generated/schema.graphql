"""
The `JSON` scalar type represents JSON values as specified by [ECMA-404](http://www.ecma-international.org/publications/files/ECMA-ST/ECMA-404.pdf).
"""
scalar JSON

scalar BigInt

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}

type Meta {
  status: JSON
}

type Query {
  agent(id: BigInt!): agent
  agents(where: agentFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int): agentPage!
  agentCapability(id: String!): agentCapability
  agentCapabilitys(where: agentCapabilityFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int): agentCapabilityPage!
  reputationFeedback(id: String!): reputationFeedback
  reputationFeedbacks(where: reputationFeedbackFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int): reputationFeedbackPage!
  mission(id: BigInt!): mission
  missions(where: missionFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int): missionPage!
  messageLog(id: BigInt!): messageLog
  messageLogs(where: messageLogFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int): messageLogPage!
  _meta: Meta
}

